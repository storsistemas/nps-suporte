<script>

const webAppURL = "COLE_AQUI_URL_DO_APPS_SCRIPT"

const params = new URLSearchParams(window.location.search)
const ticket = params.get("nps") || "sem_ticket"

const chaveVoto = "voto_"+ticket

if(localStorage.getItem(chaveVoto)){

document.getElementById("mensagem").innerHTML =
"✅ Você já avaliou este atendimento."

}else{

const container = document.getElementById("botoes")

for(let i=0;i<=10;i++){

let btn = document.createElement("button")

btn.innerText = i
btn.className = "nota"

btn.onclick = () => enviarNota(i)

container.appendChild(btn)

}

}

function enviarNota(nota){

const agora = new Date()

const data = agora.toLocaleDateString()
const hora = agora.toLocaleTimeString()

fetch(webAppURL,{
method:"POST",
body: JSON.stringify({

ticket: ticket,
nota: nota,
data: data,
hora: hora

})
})

.then(()=>{

localStorage.setItem(chaveVoto,true)

document.getElementById("botoes").innerHTML=""

document.getElementById("mensagem").innerHTML =
"🎉 Obrigado pela avaliação!"

})

}

</script>
