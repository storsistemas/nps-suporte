<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NPS Atendimento</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin-top:60px;
}

.container{
background:white;
padding:30px;
width:420px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
margin:5px;
padding:12px 16px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.detrator{background:#e74c3c}
.neutro{background:#f1c40f}
.promotor{background:#2ecc71}

</style>

</head>

<body>

<div class="container">

<h2>Como você avalia nosso atendimento?</h2>

<p>0 = Muito ruim | 10 = Excelente</p>

<div id="botoes"></div>

<h3 id="mensagem"></h3>

</div>

<script>

window.onload = function(){

const webAppURL = "https://script.google.com/macros/s/AKfycbzW2AQE4g0i2SMokfVZE7yvjOEh3fal2fjPyHq3NjiSpotd0ioBcZsEUPiOf57gB8Mb/exec"

const params = new URLSearchParams(window.location.search)

const ticket = params.get("ticket") || "sem_ticket"
const telefone = params.get("tel") || "desconhecido"

const container = document.getElementById("botoes")

for(let i=0;i<=10;i++){

let btn = document.createElement("button")

btn.innerText = i

if(i <=6){
btn.className="detrator"
}
else if(i <=8){
btn.className="neutro"
}
else{
btn.className="promotor"
}

btn.onclick = function(){

const agora = new Date()

const data = agora.toLocaleDateString()
const hora = agora.toLocaleTimeString()

fetch(webAppURL,{
method:"POST",
body: JSON.stringify({

ticket:ticket,
telefone:telefone,
nota:i,
data:data,
hora:hora

})
})

.then(()=>{

container.innerHTML=""

document.getElementById("mensagem").innerHTML =
"🎉 Obrigado pelo seu voto!"

})

}

container.appendChild(btn)

}

}

</script>

</body>
</html>
