<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NPS Atendimento</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
margin-top:60px;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
margin:5px;
padding:10px 15px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;
background:#2ecc71;
color:white;
}

button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h2>Como você avalia nosso atendimento?</h2>

<p>0 = Muito ruim | 10 = Excelente</p>

<div id="botoes"></div>

<p id="mensagem"></p>

</div>

<script>

window.onload = function(){

const webAppURL = "https://script.google.com/macros/s/AKfycbxYeMijVhjJ8T-pILTd3ZMf5xZiD-6QIgCqvZCICRZ7RNUT_rLncsXm1HgO-jQW92b1/exec"

const params = new URLSearchParams(window.location.search)
const ticket = params.get("nps") || "sem_ticket"

const chaveVoto = "voto_" + ticket

const container = document.getElementById("botoes")

if(localStorage.getItem(chaveVoto)){

document.getElementById("mensagem").innerHTML =
"✅ Você já avaliou este atendimento."

}else{

for(let i=0;i<=10;i++){

let btn = document.createElement("button")

btn.innerText = i

btn.onclick = function(){

const agora = new Date()

const data = agora.toLocaleDateString()
const hora = agora.toLocaleTimeString()

fetch(webAppURL,{
method:"POST",
body: JSON.stringify({

ticket: ticket,
nota: i,
data: data,
hora: hora

})
})
.then(()=>{

localStorage.setItem(chaveVoto,true)

container.innerHTML=""

document.getElementById("mensagem").innerHTML =
"🎉 Obrigado pela avaliação!"

})

}

container.appendChild(btn)

}

}

}

</script>

</body>
</html>
