<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avaliação de Atendimento</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:50px;
background:#f4f4f4;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
margin:5px;
padding:10px 15px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.nota{
background:#2ecc71;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Como você avalia nosso atendimento?</h2>

<p>0 = Muito ruim | 10 = Excelente</p>

<div id="botoes"></div>

<p id="mensagem"></p>

</div>

<script>

const webAppURL = "COLE_AQUI_URL_DO_APPS_SCRIPT"

if(localStorage.getItem("jaVotou")){

document.getElementById("mensagem").innerHTML =
"✅ Você já registrou sua avaliação. Obrigado!"

}else{

const container = document.getElementById("botoes")

for(let i=0;i<=10;i++){

let btn = document.createElement("button")

btn.innerText = i
btn.className = "nota"

btn.onclick = () => enviarNota(i)

container.appendChild(btn)

}

}

function enviarNota(nota){

const agora = new Date()

const data = agora.toLocaleDateString()
const hora = agora.toLocaleTimeString()

fetch(webAppURL,{https://script.google.com/macros/s/AKfycbyiY4l14kVWUhYLrzzUjQTuCyan_WKBmtF3lbTJu9Idbi7uu9g6PrQ3cPlCtk1SOpKZ/exec}
method:"POST",
body: JSON.stringify({

nota: nota,
data: data,
hora: hora

})
})

.then(()=>{

localStorage.setItem("jaVotou", true)

document.getElementById("botoes").innerHTML=""

document.getElementById("mensagem").innerHTML =
"🎉 Obrigado pela sua avaliação!"

})

}

</script>

</body>
</html>
