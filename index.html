<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação NPS</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .nps-container { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 20px; }
        .nps-btn { border: 1px solid #ccc; background: white; padding: 10px; cursor: pointer; border-radius: 5px; flex: 1; transition: 0.3s; font-weight: bold; }
        .nps-btn:hover { background: #007bff; color: white; border-color: #007bff; }
        .hidden { display: none; }
        .loading { color: #666; font-style: italic; }
        .msg-sucesso { color: #28a745; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="step-voto">
        <h2>Quão satisfeito ficou com o atendimento recebido?</h2>
        <div class="nps-container">
            <script>
                for(let i=0; i<=10; i++) {
                    document.write(`<button class="nps-btn" onclick="enviarVoto(${i})">${i}</button>`);
                }
            </script>
        </div>
        <p style="font-size: 0.8rem; color: #888;">0 = Totalmente insatisfeito | 10 = Totalmente satisfeito</p>
    </div>

    <div id="step-registrando" class="hidden">
        <h2 class="loading">Registrando sua avaliação...</h2>
    </div>

    <div id="step-obrigado" class="hidden">
        <h2 class="msg-sucesso">Obrigado pelo seu voto!</h2>
        <p>Sua opinião é muito importante para nós.</p>
    </div>
</div>

<script>
   // SUBSTITUA PELA SUA NOVA URL DO GOOGLE APPS SCRIPT
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzijGrIYkoOi3ZbuD-xjqXIqnARdgqKVZRjSzdwoRVv0lKc-Ec9vp1O9DCT40HlXfrs/exec";

// Controle de Sessão: Se já votou, pula direto para a tela de agradecimento
window.onload = function() {
    if (sessionStorage.getItem("nps_votado")) {
        mostrarTela("step-obrigado");
    }
};

function mostrarTela(id) {
    // Esconde todas as telas
    document.getElementById("step-voto").classList.add("hidden");
    document.getElementById("step-registrando").classList.add("hidden");
    document.getElementById("step-obrigado").classList.add("hidden");
    
    // Mostra a tela desejada
    document.getElementById(id).classList.remove("hidden");
}

function enviarVoto(valorNota) {
    // 1. Muda para tela de "Registrando"
    mostrarTela("step-registrando");

    // 2. Envia os dados para o Google Sheets
    fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors", // Crucial para funcionar com Google Apps Script
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nota: valorNota })
    })
    .then(() => {
        // 3. Salva na sessão do navegador que o usuário já votou
        sessionStorage.setItem("nps_votado", "true");
        
        // 4. Aguarda 1.5 segundos (para o usuário ler o 'registrando') e mostra o 'obrigado'
        setTimeout(() => {
            mostrarTela("step-obrigado");
        }, 1500);
    })
    .catch(err => {
        console.error("Erro ao votar:", err);
        alert("Ops! Tivemos um problema. Tente novamente.");
        mostrarTela("step-voto");
    });
}
</script>

</body>
</html>
