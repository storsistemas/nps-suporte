<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Avaliação de Atendimento</title>

<style>

/* Layout da página */

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin-top:60px;
}

.container{
background:white;
padding:30px;
width:420px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Botões NPS */

button{
margin:5px;
padding:12px 16px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.detrator{background:#e74c3c}
.neutro{background:#f1c40f}
.promotor{background:#2ecc71}

/* Tela de carregamento */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
font-size:18px;
z-index:999;
}

/* animação */

.loader{
border:6px solid #f3f3f3;
border-top:6px solid #2ecc71;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="container">

<h2>Como você avalia nosso atendimento?</h2>

<p>0 = Muito ruim | 10 = Excelente</p>

<div id="botoes"></div>

<h3 id="mensagem"></h3>

</div>

<!-- Tela de carregamento -->

<div id="loading">

<div class="loader"></div>

<p>Registrando sua avaliação...</p>

</div>

<script>

window.onload = function(){

const webAppURL = "https://script.google.com/macros/s/AKfycbwVA5rcBvblL_O6vEH9kWxMYJ5zOFONv05cGF-igeOcAtblg3LuAaoGI8__j_jqzKS6/exec"

const params = new URLSearchParams(window.location.search)

const telefone = params.get("tel") || "desconhecido"

const container = document.getElementById("botoes")

let enviando = false

for(let i=0;i<=10;i++){

let btn = document.createElement("button")

btn.innerText = i

if(i <=6){
btn.className="detrator"
}
else if(i <=8){
btn.className="neutro"
}
else{
btn.className="promotor"
}

btn.onclick = function(){

if(enviando) return

enviando = true

document.getElementById("loading").style.display="flex"

const agora = new Date()

const data = agora.toLocaleDateString()
const hora = agora.toLocaleTimeString()

fetch(webAppURL,{
method:"POST",
body: JSON.stringify({

telefone:telefone,
nota:i,
data:data,
hora:hora

})

})

.then(()=>{

document.getElementById("loading").style.display="none"

container.innerHTML=""

document.getElementById("mensagem").innerHTML =
"🎉 Obrigado pela sua avaliação!"

})

}

container.appendChild(btn)

}

}

</script>

</body>

</html>
